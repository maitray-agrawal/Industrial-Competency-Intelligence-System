{% extends "base.html" %}
{% block title %}Error {{ code }}{% endblock %}
{% block content %}
<div class="error-page">
    <div class="error-code">{{ code }}</div>
    <div class="error-message">{{ message }}</div>
    <a href="{{ url_for('index') }}" class="primary-btn">← Return to Dashboard</a>
</div>
{% endblock %}
