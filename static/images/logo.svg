<svg viewBox="0 0 600 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .tata-blue { fill: #0066B4; }
      .tata-white { fill: #FFFFFF; }
    </style>
  </defs>

  <!-- Top curved section of T -->
  <ellipse cx="300" cy="80" rx="160" ry="70" class="tata-blue"/>

  <!-- Left curved quarter section -->
  <path d="M 120 150 Q 80 200 80 280 Q 80 340 140 360 L 180 280 Q 170 220 170 150 Z" class="tata-blue"/>

  <!-- Right curved quarter section -->
  <path d="M 480 150 Q 430 220 420 280 L 460 360 Q 520 340 520 280 Q 520 200 480 150 Z" class="tata-blue"/>

  <!-- White horizontal bar (negative space in T) -->
  <rect x="140" y="125" width="320" height="35" class="tata-white"/>

  <!-- White vertical stem of T -->
  <rect x="255" y="100" width="90" height="290" class="tata-white"/>

  <!-- TATA Text -->
  <g>
    <!-- T -->
    <rect x="80" y="430" width="60" height="180" class="tata-blue"/>
    <rect x="50" y="430" width="120" height="40" class="tata-blue"/>

    <!-- A -->
    <polygon points="200,610 170,430 230,430 260,610 240,610 220,550 200,550 180,610" class="tata-blue"/>
    <rect x="180" y="550" width="50" height="25" class="tata-blue"/>

    <!-- T -->
    <rect x="310" y="430" width="60" height="180" class="tata-blue"/>
    <rect x="280" y="430" width="120" height="40" class="tata-blue"/>

    <!-- A -->
    <polygon points="430,610 400,430 460,430 490,610 470,610 450,550 430,550 410,610" class="tata-blue"/>
    <rect x="410" y="550" width="50" height="25" class="tata-blue"/>
  </g>
</svg>
